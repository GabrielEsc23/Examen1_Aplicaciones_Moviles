<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="custom-toolbar">
    <ion-title>Registros</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="registros-content">
  
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="container">
    
    <div class="welcome-section">
      <ion-icon name="game-controller-outline" class="main-icon"></ion-icon>
      <h1>Publicaciones</h1>
      <p>Historial de encuestas realizadas</p>
    </div>

    <div *ngIf="registros.length === 0" class="ion-text-center">
      <p style="color: #dbeafe;">No hay registros para mostrar</p>
    </div>

    <ion-card *ngFor="let item of registros" class="registro-card">
      
      <ion-img *ngIf="item.imagen" [src]="item.imagen"></ion-img>
      
      <ion-card-header>
        <ion-card-subtitle>
          <ion-icon name="calendar-outline"></ion-icon> 
          {{ item.fecha | date:'dd/MM/yyyy HH:mm' }}
        </ion-card-subtitle>
        <ion-card-title>
          {{ item.videojuego }}
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item lines="none" class="info-item">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label>
            <h3>{{ item.alias }}</h3>
            <p>Jugador</p>
          </ion-label>
        </ion-item>

        <ion-item lines="none" class="info-item" *ngIf="item.ubicacion">
          <ion-icon name="location-outline" slot="start"></ion-icon>
          <ion-label class="ion-text-wrap">
            <p>{{ item.ubicacion }}</p>
          </ion-label>
        </ion-item>

        <div class="comentario-box" *ngIf="item.comentario">
          <p class="comentario-text">"{{ item.comentario }}"</p>
        </div>

        <ion-badge class="plataforma-badge">
          {{ item.plataforma }}
        </ion-badge>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
