<ion-header>
  <ion-toolbar class="custom-toolbar">

    <ion-title>
      Videojuegos
    </ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="games-content">

  <div class="container">

    <div class="title-section">

      <h1>Buscar Videojuegos</h1>

      <p>
        Consulta información desde FreeToGame API
      </p>

    </div>

    <ion-card class="search-card">

      <ion-card-content>

        <ion-input
          label="Nombre del juego"
          [(ngModel)]="gameName">
        </ion-input>

        <ion-button
          expand="block"
          (click)="searchGame()">

          Buscar Juego

        </ion-button>

      </ion-card-content>

    </ion-card>

    <ion-card
      class="game-card"
      *ngFor="let game of filteredGames">

      <img [src]="game.thumbnail">

      <ion-card-header>

        <ion-card-title>
          {{ game.title }}
        </ion-card-title>

      </ion-card-header>

      <ion-card-content>

        <p>
          <strong>Género:</strong>
          {{ game.genre }}
        </p>

        <p>
          <strong>Plataforma:</strong>
          {{ game.platform }}
        </p>

        <p>
          {{ game.short_description }}
        </p>

        <ion-button
          expand="block"
          class="select-button"
          (click)="selectGame(game)">

          Seleccionar

        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
